<title>Novena & Training Calendar 2026–2027</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f7f7f7;
  --ink: #111111;
  --ink-mid: #444444;
  --ink-light: #999999;
  --border: #e0e0e0;
  --border-strong: #111111;
  --accent: #111111;

  --mobility: #1a6b3a;
  --zone2:    #1a3f7a;
  --strength: #7a1a1a;

  --today-ring: #111111;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 0;
}

.page { max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

/* ── Header ── */
.header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--ink); }
.supertitle { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.22em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 0.75rem; }
.header h1 { font-family: 'Outfit', sans-serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800; line-height: 1; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: -0.02em; color: var(--ink); }
.header .subtitle { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 300; color: var(--ink-light); letter-spacing: 0.04em; }

/* ── Legend ── */
.legends { display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; margin-bottom: 2rem; padding: 1rem 1.25rem; border: 1px solid var(--border); background: var(--surface); }
.legend-group { display: flex; flex-direction: column; gap: 5px; }
.legend-group-title { font-family: 'Outfit', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; }
.legend-items { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: var(--ink-mid); font-weight: 300; }
.legend-workout { display: inline-block; font-family: 'Outfit', sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; padding: 3px 8px; color: white; text-transform: uppercase; }

/* ── Month navigation ── */
.month-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 2rem; }
.month-btn { font-family: 'Outfit', sans-serif; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em; padding: 6px 14px; border: 1px solid var(--border); background: transparent; color: var(--ink-light); cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
.month-btn:hover { border-color: var(--ink); color: var(--ink); }
.month-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

/* ── Calendar grid ── */
.calendar-wrap { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.month-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }

.day-headers { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px; }
.day-header { font-family: 'Outfit', sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.18em; text-align: center; color: var(--ink-light); padding: 5px 0; text-transform: uppercase; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

/* ── Day cell ── */
.day-cell {
  min-height: 95px;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 6px 6px 7px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.12s;
}
.day-cell:hover { border-color: var(--ink); }
.day-cell.empty { background: var(--surface); border-color: #eeeeee; }
.day-cell.today { border: 2px solid var(--ink); }
.day-cell.today .day-num { color: var(--ink); font-weight: 700; }

.day-num { font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--ink-mid); line-height: 1; align-self: flex-end; }

.novena-label { font-size: 0.68rem; line-height: 1.3; color: var(--ink); flex: 1; font-weight: 400; }
.novena-label a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--border); transition: border-color 0.12s; }
.novena-label a:hover { border-color: var(--ink); }
.novena-day { font-family: 'Outfit', sans-serif; font-size: 0.52rem; font-weight: 600; letter-spacing: 0.1em; color: var(--ink-light); margin-top: 2px; text-transform: uppercase; }

.workout-badge {
  display: inline-block;
  font-family: 'Outfit', sans-serif;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  color: white;
  align-self: flex-start;
  margin-top: auto;
}
.workout-badge.mobility  { background: var(--mobility); }
.workout-badge.zone2     { background: var(--zone2); }
.workout-badge.strength  { background: var(--strength); }

.today-marker {
  position: absolute;
  top: 4px; left: 6px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.48rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--ink);
  text-transform: uppercase;
}

.feast-label {
  font-family: 'Outfit', sans-serif;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #fff;
  background: #b8860b;
  padding: 2px 5px;
  align-self: flex-start;
  margin-top: 2px;
}

.feast-label.checkpoint {
  background: #1a3f7a;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .day-cell { min-height: 72px; }
  .novena-label { font-size: 0.6rem; }
  .workout-badge { font-size: 0.48rem; }
  .header h1 { font-size: 1.6rem; }
}
@media (max-width: 420px) {
  .day-cell { min-height: 58px; padding: 4px; }
  .novena-label { font-size: 0.55rem; }
  .day-num { font-size: 0.65rem; }
}
</style>

function getFeast(date) {
  const key = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`;
  return feastMap.hasOwnProperty(key) ? feastMap[key] : null;
}

// ── 9-day training cycle (starts Apr 3 2026) ────────────────────────────────
// Day 1=Mobility, 2=Zone2, 3=Strength, 4=Mobility, 5=Zone2, 6=Strength, 7=Mobility, 8=Zone2, 9=Strength
const cyclePattern = ['mobility','zone2','strength','mobility','zone2','strength','mobility','zone2','strength'];
const cycleStart = new Date(2026, 3, 3); // April 3 2026 = day 1

function getWorkout(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const s = new Date(cycleStart); s.setHours(0,0,0,0);
  const diff = Math.round((d - s) / 86400000);
  if (diff < 0) return null;
  return cyclePattern[diff % 9];
}

function getNovena(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  for (const n of novenas) {
    const s = new Date(n.start[0], n.start[1]-1, n.start[2]);
    const e = new Date(n.end[0],   n.end[1]-1,   n.end[2]);
    if (d >= s && d <= e) return n;
  }
  return null;
}

function getNovenaLength(novena) {
  const s = new Date(novena.start[0], novena.start[1]-1, novena.start[2]);
  const endYear = (novena.end[1] < novena.start[1] && novena.end[0] === novena.start[0]) ? novena.start[0] + 1 : novena.end[0];
  const e = new Date(endYear, novena.end[1]-1, novena.end[2]);
  return Math.round((e - s) / 86400000) + 1;
}

function getNovenaDay(date, novena) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const s = new Date(novena.start[0], novena.start[1]-1, novena.start[2]);
  return Math.round((d - s) / 86400000) + 1;
}

  months.forEach(([y,m], i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === activeMonth ? ' active' : '');
    btn.textContent = monthNames[m-1].slice(0,3) + ' ' + y;
    btn.onclick = () => {
      activeMonth = i;
      document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMonth();
    };
    nav.appendChild(btn);
  });
}

// ── Render a month ───────────────────────────────────────────────────────────
function renderMonth() {
  const [year, month] = months[activeMonth];
  const wrap = document.getElementById('calendarWrap');
  wrap.innerHTML = '';

  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const div = document.createElement('div');
  div.className = 'calendar-wrap';

  // Month title
  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = monthNames[month-1] + ' ' + year;
  div.appendChild(title);

  // Day headers
  const hdrs = document.createElement('div');
  hdrs.className = 'day-headers';
  dayNames.forEach(d => {
    const h = document.createElement('div');
    h.className = 'day-header';
    h.textContent = d;
    hdrs.appendChild(h);
  });
  div.appendChild(hdrs);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  const firstDay = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month-1, d);
    date.setHours(0,0,0,0);
    const isToday = date.getTime() === today.getTime();

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '');

    const novena = getNovena(date);
    const workout = getWorkout(date);
    const feast = getFeast(date);

    // Novena color bar
    if (novena) {
      cell.style.setProperty('--cell-novena-color', novenaColors[novena.colorIdx]);
      cell.style.cssText += `--cell-novena-color: ${novenaColors[novena.colorIdx]};`;
      // Apply left border via inline style since we need dynamic color
      cell.style.borderLeft = `4px solid ${novenaColors[novena.colorIdx]}`;
      cell.style.background = `linear-gradient(to right, ${novenaColors[novena.colorIdx]}14 0%, rgba(255,255,255,0.45) 18%)`;
    }

    if (isToday) {
      const marker = document.createElement('div');
      marker.className = 'today-marker';
      marker.textContent = 'Today';
      cell.appendChild(marker);
    }

    // Day number
    const dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = d;
    cell.appendChild(dayNum);

    // Novena name
    if (novena) {
      const nLabel = document.createElement('div');
      nLabel.className = 'novena-label';
      const shortName = novena.name.replace(' Novena','');
      if (novena.url) {
        nLabel.innerHTML = `<a href="${novena.url}" target="_blank" rel="noopener">${shortName}</a>`;
      } else {
        nLabel.textContent = shortName;
      }
      const nDay = document.createElement('div');
      nDay.className = 'novena-day';
      const dayNum9 = getNovenaDay(date, novena);
      const novenaLen = getNovenaLength(novena);
      nDay.textContent = novena.dailyReset ? `Day 1 of 1` : `Day ${dayNum9} of ${novenaLen}`;
      nLabel.appendChild(nDay);
      cell.appendChild(nLabel);
    }

    // Feast day marker
    if (feast) {
      const feasts = Array.isArray(feast) ? feast : [feast];
      feasts.forEach(f => {
        const fLabel = document.createElement('div');
        fLabel.className = 'feast-label' + (f.includes('Checkpoint') ? ' checkpoint' : '');
        fLabel.textContent = f;
        cell.appendChild(fLabel);
      });
    }

    // Workout badge
    if (workout) {
      const badge = document.createElement('div');
      badge.className = `workout-badge ${workout}`;
      badge.textContent = workoutLabels[workout];
      cell.appendChild(badge);
    }

    grid.appendChild(cell);
  }

  div.appendChild(grid);
  wrap.appendChild(div);
}

// ── Init ─────────────────────────────────────────────────────────────────────
// Set active month to current month
const now = new Date();
const currentIdx = months.findIndex(([y,m]) => y === now.getFullYear() && m === now.getMonth()+1);
if (currentIdx >= 0) activeMonth = currentIdx;

buildNav();
renderMonth();

// Scroll today into view
setTimeout(() => {
  const todayCell = document.querySelector('.day-cell.today');
  if (todayCell) todayCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 150);
</script>
</body>
